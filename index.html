<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tifosi</title>

<style>
body { font-family: Arial; background:#000; color:#fff; margin:0; text-align:center;}
h1 { background:#d6c2a1; color:#642d00; padding:20px; margin:0; border-bottom:3px solid #642d00;}
h3 { color:#642d00; margin:0 0 10px;}
.container { max-width:500px; margin:auto; padding:10px;}

.card { background:#d6c2a1; border-radius:15px; padding:15px; margin:15px 0;
box-shadow:0 4px 10px rgba(0,0,0,0.15); border:2px solid #d6c2a1; }

.match { font-size:18px; font-weight:bold; color:#111;}
.date { color:#642d00;}

img { width:100%; border-radius:12px; border:2px solid #d6c2a1;}

table { width:100%; border-collapse:collapse; background:#d6c2a1; color:#111;}
table th { background-color:#d6c2a1 !important; color:#642d00 !important; padding:8px; border-bottom:2px solid #000; text-transform: uppercase; }
tr:nth-child(even) td { background:#f7f2e8; }
td { padding:6px; border-bottom:1px solid rgba(0,0,0,0.08); color:#111;}

.tifosi {
  background: linear-gradient(90deg, rgba(214,194,161,0.35), rgba(0,0,0,0.05));
  font-weight:bold;
  color:#642d00;
  border-left:4px solid #642d00;
}

.tifosi td {
  color: #642d00;
}

ul { list-style:none; padding:0;}
li { background:white; margin:5px 0; padding:10px;
border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,.12); border-left:4px solid #642d00; color:#111;}
</style>

</head>
<body>

<h1>Tifosi</h1>

<div class="container">

<div class="card">
<h3>Próximo partido</h3>
<div id="proximo">
  <img id="img-proximo" alt="Próximo partido" style="display:none;">
</div>
</div>

<div class="card">
<h3>Último resultado</h3>
<img id="img">
</div>

<div class="card">
<h3>Clasificación</h3>
<div id="clasificacion"></div>
</div>

<div class="card">
<h3>Resultados equipo</h3>
<ul id="equipo"></ul>
</div>

<div class="card">
<h3>Resultados liga</h3>
<ul id="liga"></ul>
</div>

</div>

<script>
const imagenCache = new Map();
let ultimaImagenClasificacion = null;
let clasificacionBuscada = false;
let imgClasificacionElement = null;
let cargandoDatos = false;

async function getJSON(url){
  try{
    let r = await fetch(url + "?t=" + Date.now());
    return await r.json();
  }catch(e){
    console.log("Error en", url);
    return null;
  }
}

async function cargarDatos(buscarClasificacion = false){

  // PROXIMO
  let proximo = await getJSON('data/proximo.json');
  let div = document.getElementById("proximo");

  let imgProximo = document.getElementById("img-proximo");

  if(proximo && proximo.jornada){
    div.innerHTML = "";
    div.appendChild(imgProximo);
    imgProximo.src = "imagenes/j" + proximo.jornada + "/info/j" + proximo.jornada + "_info.png?t=" + Date.now();
    imgProximo.style.display = "block";
  }else{
    imgProximo.style.display = "none";
    imgProximo.src = "";
    div.innerText = "No definido";
  }

  // RESULTADOS EQUIPO
  let resultadosEquipo = await getJSON('data/resultados_equipo.json');
  if(!Array.isArray(resultadosEquipo)) resultadosEquipo = [];

  let jornadasReferencia = [];
  if (proximo && Number.isInteger(proximo.jornada)) jornadasReferencia.push(proximo.jornada);
  if (Array.isArray(resultadosEquipo) && resultadosEquipo.length) {
    let ultimo = resultadosEquipo[resultadosEquipo.length - 1];
    if (ultimo && Number.isInteger(ultimo.jornada)) jornadasReferencia.push(ultimo.jornada);
  }

  async function buscarUltimaImagen(tipo, nombreBase) {
    const MAX_JORNADA_BUSQUEDA = 30;
    const BUSQUEDA_ADELANTE = 5;
    let maxJornada = jornadasReferencia.length ? Math.max(...jornadasReferencia) : 0;
    let inicioBusqueda = Math.max(maxJornada + BUSQUEDA_ADELANTE, MAX_JORNADA_BUSQUEDA);

    const rutasProbadas = new Set();
    for (let jornada = inicioBusqueda; jornada >= 1; jornada--) {
      let ruta = `imagenes/j${jornada}/${tipo}/j${jornada}_${nombreBase}.png`;
      if (rutasProbadas.has(ruta)) continue;
      rutasProbadas.add(ruta);

      const cacheEntry = imagenCache.get(ruta);
      if (cacheEntry && Date.now() - cacheEntry.timestamp < 60000) {
        if (cacheEntry.existe) return { ruta, jornada };
        continue;
      }

      await new Promise((resolve) => {
        let img = new Image();
        img.onload = () => {
          imagenCache.set(ruta, { existe: true, timestamp: Date.now() });
          resolve();
        };
        img.onerror = () => {
          imagenCache.set(ruta, { existe: false, timestamp: Date.now() });
          resolve();
        };
        img.src = ruta + "?t=" + Date.now();
      });

      const resultado = imagenCache.get(ruta);
      if (resultado && resultado.existe) return { ruta, jornada };
    }
    return null;
  }

  let ultimaImagenResultado = await buscarUltimaImagen('resultado', 'resultado');
  let imgResultado = document.getElementById("img");
  if (ultimaImagenResultado) {
    imgResultado.src = ultimaImagenResultado.ruta + "?t=" + Date.now();
  } else {
    imgResultado.src = "";
  }

  let ul = document.getElementById("equipo");
  ul.innerHTML = "";
  if(Array.isArray(resultadosEquipo) && resultadosEquipo.length){
    resultadosEquipo.slice().reverse().forEach(r=>{
      let li = document.createElement("li");
      li.innerText = `${r.local} ${r.goles_local}-${r.goles_visitante} ${r.visitante}`;
      ul.appendChild(li);
    });
  }

  // LIGA
  let liga = await getJSON('data/resultados_liga.json');
  if(!Array.isArray(liga)) liga = [];
  let ul2 = document.getElementById("liga");
  ul2.innerHTML = "";

  if(Array.isArray(liga) && liga.length){
    liga.slice().reverse().forEach(r=>{
      let li = document.createElement("li");
      li.innerText = `${r.local} ${r.goles_local}-${r.goles_visitante} ${r.visitante}`;
      ul2.appendChild(li);
    });
  }

  // CLASIFICACION
  let clas = await getJSON('data/clasificacion.json');
  if(!Array.isArray(clas)) clas = [];

  let cont = document.getElementById("clasificacion");
  cont.innerHTML = "Cargando clasificación...";

  // Solo buscar la última imagen de clasificación la primera vez que carga la página
  let imagenMostrada = false;
  if (!clasificacionBuscada) {
    clasificacionBuscada = true;
    ultimaImagenClasificacion = await buscarUltimaImagen('clasificacion', 'clasificacion');
  }

  if (ultimaImagenClasificacion) {
    cont.innerHTML = "";
    if (!imgClasificacionElement) {
      imgClasificacionElement = document.createElement("img");
      imgClasificacionElement.src = ultimaImagenClasificacion.ruta + "?t=" + Date.now();
      imgClasificacionElement.alt = "Clasificación";
      imgClasificacionElement.style.width = "100%";
      imgClasificacionElement.style.borderRadius = "12px";
    }
    cont.appendChild(imgClasificacionElement);
    imagenMostrada = true;
  }

  // Si no se encontró imagen, mostrar tabla
  if (!imagenMostrada) {
    cont.innerHTML = "";
    if (Array.isArray(clas) && clas.length) {

      clas.sort((a,b)=> b.pts - a.pts);

      let table = document.createElement("table");

      table.innerHTML =
        "<tr><th>#</th><th>Equipo</th><th>PJ</th><th>G</th><th>E</th><th>P</th><th>DIF</th><th>PTS</th></tr>";

      function abbreviateTeam(name) {
        let parts = name.trim().split(/\s+/).filter(Boolean);
        if (parts.length === 0) return name;
        let short = parts[0];
        if (parts.length > 1) {
          let second = parts[1].replace(/[^A-Za-zÁÉÍÓÚÜÑáéíóúüñ0-9]/g, '');
          second = second.slice(0, 2);
          if (second) {
            short = `${parts[0]} ${second}.`;
          }
        }
        if (short.length <= 10) return short;
        let truncated = short.slice(0, 9);
        if (truncated.endsWith(' ') || (short.length > 9 && short[9] === ' ')) return truncated.trimEnd();
        return truncated + '.';
      }

      clas.forEach((e,i)=>{
        let row = document.createElement("tr");

        if (e.equipo && e.equipo.trim().toLowerCase() === "tifosi") {
          row.classList.add("tifosi");
        }

        row.innerHTML =
          `<td>${i+1}</td>
           <td>${abbreviateTeam(e.equipo)}</td>
           <td>${e.pj}</td>
           <td>${e.g || 0}</td>
           <td>${e.e || 0}</td>
           <td>${e.p || 0}</td>
           <td>${typeof e.dif !== 'undefined' ? e.dif : (e.favor && e.contra ? e.favor - e.contra : 0)}</td>
           <td>${e.pts}</td>`;

        table.appendChild(row);
      });

      cont.appendChild(table);
    }
  }
}

async function iniciarRefresco() {
  if (cargandoDatos) return;
  cargandoDatos = true;
  try {
    await cargarDatos();
  } finally {
    cargandoDatos = false;
    setTimeout(iniciarRefresco, 5000);
  }
}

iniciarRefresco();
</script>

</body>
</html>
