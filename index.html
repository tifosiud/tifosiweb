<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tifosi</title>

<style>
body { font-family: Arial; background:#f2f2f2; margin:0; text-align:center;}
h1 { background:#1565c0; color:white; padding:20px; margin:0;}
.container { max-width:500px; margin:auto; padding:10px;}

.card { background:white; border-radius:15px; padding:15px; margin:15px 0;
box-shadow:0 4px 10px rgba(0,0,0,0.1); }

.match { font-size:18px; font-weight:bold;}
.date { color:#777;}

img { width:100%; border-radius:12px;}

table { width:100%; border-collapse:collapse;}
th { background:#1565c0; color:white; padding:8px;}
td { padding:6px; border-bottom:1px solid #ddd;}

.tifosi { background:#cfe3ff !important; font-weight:bold;}

ul { list-style:none; padding:0;}
li { background:white; margin:5px 0; padding:10px;
border-radius:10px; box-shadow:0 2px 5px rgba(0,0,0,.1);}
</style>

</head>
<body>

<h1>Tifosi</h1>

<div class="container">

<div class="card">
<h3>Próximo partido</h3>
<div id="proximo">
  <img id="img-proximo" alt="Próximo partido" style="display:none;">
</div>
</div>

<div class="card">
<h3>Último resultado</h3>
<img id="img">
</div>

<div class="card">
<h3>Clasificación</h3>
<div id="clasificacion"></div>
</div>

<div class="card">
<h3>Resultados equipo</h3>
<ul id="equipo"></ul>
</div>

<div class="card">
<h3>Resultados liga</h3>
<ul id="liga"></ul>
</div>

</div>

<script>
async function getJSON(url){
  try{
    let r = await fetch(url + "?t=" + Date.now());
    return await r.json();
  }catch(e){
    console.log("Error en", url);
    return null;
  }
}

async function cargarDatos(){

  // PROXIMO
  let proximo = await getJSON('data/proximo.json');
  let div = document.getElementById("proximo");

  let imgProximo = document.getElementById("img-proximo");

  if(proximo && proximo.jornada){
    div.innerHTML = "";
    imgProximo.src = "imagenes/proximo_jornada_" + proximo.jornada + ".png";
    imgProximo.style.display = "block";
  }else{
    div.innerText = "No definido";
    imgProximo.style.display = "none";
    imgProximo.src = "";
  }

  // RESULTADOS EQUIPO
  let resultados = await getJSON('data/resultados_equipo.json') || [];

  if(resultados.length){
    let ultimo = resultados[resultados.length -1];
    document.getElementById("img").src =
      "imagenes/jornada_" + ultimo.jornada + ".png";
  }

  let ul = document.getElementById("equipo");
  ul.innerHTML = "";
  resultados.slice().reverse().forEach(r=>{
    let li = document.createElement("li");
    li.innerText = `${r.local} ${r.goles_local}-${r.goles_visitante} ${r.visitante}`;
    ul.appendChild(li);
  });

  // LIGA
  let liga = await getJSON('data/resultados_liga.json') || [];
  let ul2 = document.getElementById("liga");
  ul2.innerHTML = "";

  liga.slice().reverse().forEach(r=>{
    let li = document.createElement("li");
    li.innerText = `${r.local} ${r.goles_local}-${r.goles_visitante} ${r.visitante}`;
    ul2.appendChild(li);
  });

  // CLASIFICACION
  let clas = await getJSON('data/clasificacion.json') || [];

  let cont = document.getElementById("clasificacion");
  cont.innerHTML = "";

  if(Array.isArray(clas) && clas.length){

    clas.sort((a,b)=> b.pts - a.pts);

    let table = document.createElement("table");

    table.innerHTML =
      "<tr><th>#</th><th>Equipo</th><th>PJ</th><th>PTS</th></tr>";

    clas.forEach((e,i)=>{
      let row = document.createElement("tr");

      if(e.equipo==="Tifosi"){
        row.classList.add("tifosi");
      }

      row.innerHTML =
        `<td>${i+1}</td>
         <td>${e.equipo}</td>
         <td>${e.pj}</td>
         <td>${e.pts}</td>`;

      table.appendChild(row);
    });

    cont.appendChild(table);
  }
}

setInterval(cargarDatos,5000);
cargarDatos();
</script>

</body>
</html>
