<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tifosi</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <h1>Tifosi</h1>

  <div class="container">
    <div class="card">
      <h3>Próximo partido</h3>
      <div id="proximo">
        <img id="img-proximo" alt="Próximo partido" style="display:none;">
      </div>
    </div>

    <div class="card">
      <h3>Último resultado</h3>
      <div id="resultado">
        <img id="img" alt="Último resultado" style="display:none;">
      </div>
    </div>

    <div class="card">
      <h3>Clasificación</h3>
      <div id="clasificacion-imagen"></div>
      <div id="clasificacion"></div>
    </div>

    <div class="card">
      <h3>Resultados equipo</h3>
      <ul id="equipo"></ul>
    </div>

    <div class="card">
      <h3>Resultados liga</h3>
      <ul id="liga"></ul>
    </div>
  </div>

  <script type="module" src="/app.js"></script>
</body>
</html>
